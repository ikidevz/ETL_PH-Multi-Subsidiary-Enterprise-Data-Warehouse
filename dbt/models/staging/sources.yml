# models/staging/sources.yml

version: 2

sources:
  - name: bronze
    database: enterprise_dw
    schema: bronze
    description: >
      Raw bronze tables loaded from each subsidiary via the metadata-driven
      ingestion pipeline in the scripts folder. The bronze tables are created
      by the Snowflake bootstrap scripts and populated by the load scripts,
      then consumed by the dbt staging models.
    config:
      loaded_at_field: _loaded_at
      freshness:
        warn_after: { count: 25, period: hour }
        error_after: { count: 49, period: hour }

    tables:
      # ── SUB_A · RetailCo ──────────────────────────────────────────────────

      - name: raw_sub_a_sales
        description: >
          Retail POS sales transactions from SUB_A generated by scripts/generate_sub_a.py.
          The bronze table contains the raw transaction payload plus the ingestion metadata columns.
        columns:
          - name: order_id
            description: "Natural primary key — UUID per transaction"
            tests: [not_null, unique]
          - name: order_date
            description: "Date the order was placed"
            tests: [not_null]
          - name: customer_id
            description: "FK to raw_sub_a_customers.customer_id"
            tests: [not_null]
          - name: product_sku
            description: "Product SKU used by the source system"
            tests: [not_null]
          - name: channel
            description: "Sales channel from the source payload"
            tests: [not_null]
          - name: category
            description: "Product category from the source payload"
            tests: [not_null]
          - name: region
            description: "PH region of the sale"
            tests: [not_null]
          - name: qty
            description: "Units sold"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 1
                  max_value: 10
          - name: unit_price
            description: "Price per unit in PHP before discount"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 100
                  max_value: 5000
          - name: discount_pct
            description: "Discount percentage applied"
            tests:
              - not_null
          - name: net_sales
            description: "Net revenue after discount in PHP"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 50000
          - name: currency
            description: "ISO currency code"
            tests: [not_null]
          - name: updated_at
            description: "CDC watermark used by incremental ingestion"
            tests: [not_null]
          - name: _subsidiary_code
            description: "Hardcoded source identifier"
            tests: [not_null]
          - name: _loaded_at
            description: "Audit timestamp appended by the ingestion engine"
            tests: [not_null]

      - name: raw_sub_a_customers
        description: >
          Customer master from SUB_A generated by scripts/generate_sub_a.py.
          The bronze table is reloaded as a full load on each run.
        columns:
          - name: customer_id
            description: "Natural primary key"
            tests: [not_null, unique]
          - name: full_name
            tests: [not_null]
          - name: email
            tests: [not_null]
          - name: phone
            tests: [not_null]
          - name: region
            tests: [not_null]
          - name: segment
            description: "Marketing segment"
            tests: [not_null]
          - name: join_date
            tests: [not_null]
          - name: is_active
            tests: [not_null]
          - name: _subsidiary_code
            tests: [not_null]
          - name: _loaded_at
            tests: [not_null]

      # ── SUB_B · LogisticsCo ───────────────────────────────────────────────

      - name: raw_sub_b_shipments
        description: >
          Shipment records from SUB_B generated by scripts/generate_sub_b.py.
          The bronze table contains the raw TMS shipment payload and metadata columns.
        columns:
          - name: shipment_id
            description: "Natural primary key"
            tests: [not_null, unique]
          - name: client_id
            description: "Billing client"
            tests: [not_null]
          - name: origin_city
            tests: [not_null]
          - name: dest_city
            tests: [not_null]
          - name: service_type
            tests: [not_null]
          - name: ship_date
            tests: [not_null]
          - name: expected_del
            tests: [not_null]
          - name: actual_del
            tests: [not_null]
          - name: delay_days
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 30
          - name: weight_kg
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0.01
                  max_value: 30000
          - name: volume_cbm
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0.001
                  max_value: 500
          - name: freight_revenue
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 5000000
          - name: fuel_surcharge
            tests:
              - not_null
          - name: total_revenue
            description: "Freight revenue billed to client in local currency"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 5000000
          - name: currency
            tests: [not_null]
          - name: modified_ts
            description: "CDC watermark — timestamp of last record change in TMS"
            tests: [not_null]
          - name: _subsidiary_code
            tests: [not_null]
          - name: _loaded_at
            tests: [not_null]

      # ── SUB_C · FinanceCo ─────────────────────────────────────────────────

      - name: raw_sub_c_loans
        description: >
          Loan account records from SUB_C generated by scripts/generate_sub_c.py.
          The bronze table contains the raw core-banking loan payload and metadata columns.
        columns:
          - name: loan_id
            description: "Natural primary key"
            tests: [not_null, unique]
          - name: borrower_id
            description: "Borrower ID"
            tests: [not_null]
          - name: loan_type
            description: "Loan product type"
            tests: [not_null]
          - name: origination_date
            tests: [not_null]
          - name: maturity_date
            tests: [not_null]
          - name: term_months
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 6
                  max_value: 360
          - name: principal_amount
            description: "Original loan principal in PHP"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 10000
                  max_value: 50000000
          - name: interest_rate
            description: "Annual interest rate as a percentage"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 100
          - name: outstanding_balance
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 50000000
          - name: monthly_payment
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 1000000
          - name: loan_status
            tests: [not_null]
          - name: days_past_due
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 120
          - name: branch_id
            tests: [not_null]
          - name: currency
            tests: [not_null]
          - name: last_updated
            description: "CDC watermark — last modification timestamp from core banking"
            tests: [not_null]
          - name: _subsidiary_code
            tests: [not_null]
          - name: _loaded_at
            tests: [not_null]

      # ── SUB_D · ManufactureCo (SAP S/4) ──────────────────────────────────

      - name: raw_sub_d_orders
        description: >
          SAP S/4 sales order line items from SUB_D generated by scripts/generate_sub_d.py.
          The bronze table contains the raw ERP order payload and metadata columns.
        columns:
          - name: order_num
            description: "SAP sales order number"
            tests: [not_null]
          - name: order_item
            description: "SAP line item number"
            tests: [not_null]
          - name: doc_type
            description: "SAP document type"
            tests: [not_null]
          - name: sales_org
            description: "SAP sales organisation code"
            tests: [not_null]
          - name: customer_id
            description: "SAP sold-to customer number"
            tests: [not_null]
          - name: material_id
            description: "SAP material master number"
            tests: [not_null]
          - name: plant
            description: "Supplying plant"
            tests: [not_null]
          - name: order_date
            tests: [not_null]
          - name: requested_del
            description: "Customer-requested delivery date"
            tests: [not_null]
          - name: confirmed_del
            description: "System-confirmed delivery date"
            tests: [not_null]
          - name: order_qty
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 1
                  max_value: 10000
          - name: delivered_qty
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 10000
          - name: net_price
            description: "Unit net price after conditions"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 50
                  max_value: 10000
          - name: order_value_php
            description: "Total order line value in PHP"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 100000000
          - name: currency
            tests: [not_null]
          - name: status
            tests: [not_null]
          - name: change_date
            description: "CDC watermark — date of last SAP document change"
            tests: [not_null]
          - name: _subsidiary_code
            tests: [not_null]
          - name: _loaded_at
            tests: [not_null]

      # ── SUB_E · PropertyCo ────────────────────────────────────────────────

      - name: raw_sub_e_leases
        description: >
          Lease contracts from SUB_E generated by scripts/generate_sub_e.py.
          The bronze table contains the raw property-management lease payload and metadata columns.
        columns:
          - name: contract_id
            description: "Natural primary key"
            tests: [not_null, unique]
          - name: property_id
            description: "Property master ID"
            tests: [not_null]
          - name: tenant_id
            description: "Tenant ID"
            tests: [not_null]
          - name: unit_type
            description: "Physical unit type within the property"
            tests: [not_null]
          - name: lease_type
            description: "Commercial classification of the lease"
            tests: [not_null]
          - name: area_sqm
            description: "Leased area in square metres"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 20
                  max_value: 2000
          - name: start_date
            tests: [not_null]
          - name: end_date
            tests: [not_null]
          - name: term_years
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 1
                  max_value: 10
          - name: monthly_rent_php
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 5000
                  max_value: 500000
          - name: annual_rent_php
            description: "monthly_rent_php * 12"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 60000
                  max_value: 6000000
          - name: security_deposit
            description: "Two months' rent held as security"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 10000
                  max_value: 1000000
          - name: rent_escalation_pct
            description: "Annual rent escalation rate (%)"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 3
                  max_value: 8
          - name: status
            description: "ACTIVE (end_date > today) or EXPIRED"
            tests: [not_null]
          - name: city
            description: "City where the property is located"
            tests: [not_null]
          - name: _subsidiary_code
            tests: [not_null]
          - name: _loaded_at
            tests: [not_null]
