# models/integration/schema.yml

version: 2

# ── Seeds ──────────────────────────────────────────────────────────────────

seeds:
  - name: fx_rates
    description: >
      Daily FX conversion rates generated by scripts/generate_seeds.py.
      Covers USD, SGD, EUR, JPY, CNY → PHP from 2018-01-01 to present.
      Joined to ent_transaction on rate_date = transaction_date AND
      from_currency = currency_code.
      rate column = units of foreign currency per 1 PHP.
      usd_php_rate = PHP per 1 USD (reference rate stored for reporting).
      All current subsidiaries transact in PHP so the join produces no match
      and amount_php = amount_local via the PHP short-circuit in ent_transaction.
      Architecture is correct for future foreign-currency subsidiaries.

    columns:
      - name: rate_date
        description: "Effective date of the FX rate"
        tests:
          - not_null

      - name: from_currency
        description: "Source ISO currency code"
        tests:
          - not_null
          - accepted_values:
              values: ["USD", "SGD", "EUR", "JPY", "CNY"]

      - name: to_currency
        description: "Target ISO currency code — always PHP"
        tests:
          - not_null
          - accepted_values:
              values: ["PHP"]

      - name: rate
        description: "Conversion rate: 1 from_currency = rate PHP. Used in ent_transaction: amount_local / rate → amount_php"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0001
              max_value: 10000

      - name: usd_php_rate
        description: "Spot PHP per 1 USD — reference rate stored for reporting in mart_fx_exposure"
        tests:
          - not_null

  - name: gl_account_mapping
    description: >
      Subsidiary-level GL account codes mapped to conformed Group GL codes.
      20 rows — 4 per subsidiary (REVENUE, COGS, OPEX, INTERCOMPANY_REVENUE).
      Joined in mart_gl_account_bridge and mart_intercompany_elimination.
      subsidiary_gl_code must match gl_account_code values emitted by staging views.

    columns:
      - name: subsidiary_code
        description: "Source subsidiary — SUB_A through SUB_E"
        tests:
          - not_null
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: subsidiary_gl_code
        description: "GL code as used within the subsidiary system — must match staging gl_account_code values"
        tests:
          - not_null
          - unique

      - name: group_gl_code
        description: "Conformed Group GL code for consolidation reporting (GRP-XXXX)"
        tests:
          - not_null

      - name: group_gl_name
        description: "Human-readable Group GL description"
        tests:
          - not_null

      - name: gl_category
        description: "High-level P&L category"
        tests:
          - not_null
          - accepted_values:
              values: ["REVENUE", "COGS", "OPEX"]

      - name: gl_sub_category
        description: "Detailed GL sub-category for mart_intercompany_elimination filtering"
        tests:
          - not_null

# ── Integration Models ─────────────────────────────────────────────────────

models:
  # ── ent_subsidiary ────────────────────────────────────────────────────────

  - name: ent_subsidiary
    description: >
      Static subsidiary reference table — 5 rows, one per subsidiary.
      Built from inline VALUES in SQL. Materialised as TABLE; safe to full-refresh.
      Referenced by ent_transaction (USING subsidiary_code join) and all
      mart models that need subsidiary_name and industry_type.

    config:
      materialized: table

    columns:
      - name: subsidiary_code
        description: "Primary key — SUB_A through SUB_E"
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: subsidiary_name
        description: "Human-readable subsidiary name (RetailCo, LogisticsCo, etc.)"
        tests:
          - not_null

      - name: industry_type
        description: "Industry classification of the subsidiary"
        tests:
          - not_null
          - accepted_values:
              values:
                ["Retail", "Freight", "Lending", "Manufacturing", "Real Estate"]

      - name: reporting_currency
        description: "Primary reporting currency — always PHP for all current subsidiaries"
        tests:
          - not_null
          - accepted_values:
              values: ["PHP"]

  # ── ent_customer ──────────────────────────────────────────────────────────

  - name: ent_customer
    description: >
      Conformed customer entity across all 5 subsidiaries.
      One row per customer_id_nk × subsidiary_code combination.

      SUB_A — enriched from raw_sub_a_customers: full_name, email, region,
              is_active, customer_type mapped from segment, acquire_date = join_date.
      SUB_B — derived from stg_sub_b_shipments: B2B type, acquire_date = first transaction.
      SUB_C — derived from stg_sub_c_loans: BORROWER type, acquire_date = first origination.
      SUB_D — derived from stg_sub_d_orders: B2B type, acquire_date = first order.
      SUB_E — derived from stg_sub_e_leases: TENANT type, acquire_date = first lease.

      customer_key = MD5(subsidiary_code || customer_id_nk) — globally unique surrogate.
      Used by mart_cohort_retention (acquire_date), mart_customer_360, and mart_consolidated_pnl.

    config:
      materialized: table

    columns:
      - name: customer_key
        description: "Surrogate key — MD5(subsidiary_code || customer_id_nk)"
        tests:
          - not_null
          - unique

      - name: customer_id_nk
        description: "Natural customer key from the source subsidiary system"
        tests:
          - not_null

      - name: subsidiary_code
        description: "Source subsidiary that owns this customer record"
        tests:
          - not_null
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: customer_type
        description: >
          Customer classification. SUB_A: HIGH_VALUE / STANDARD / NEW / AT_RISK
          (mapped from segment). SUB_B/D: B2B. SUB_C: BORROWER. SUB_E: TENANT.
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "HIGH_VALUE",
                  "STANDARD",
                  "NEW",
                  "AT_RISK",
                  "B2B",
                  "BORROWER",
                  "TENANT",
                ]

      - name: industry_segment
        description: "Industry segment of the customer (RETAIL, FREIGHT, LENDING, MANUFACTURING, REAL_ESTATE)"
        tests:
          - not_null
          - accepted_values:
              values:
                ["RETAIL", "FREIGHT", "LENDING", "MANUFACTURING", "REAL_ESTATE"]

      - name: acquire_date
        description: >
          Date the customer was first acquired. SUB_A: join_date from customer table.
          SUB_B/C/D/E: MIN(transaction_date) derived from first transaction.
          Used as cohort anchor in mart_cohort_retention.
        tests:
          - not_null

      - name: full_name
        description: "Customer full name — populated for SUB_A only; NULL for other subsidiaries"

      - name: email
        description: "Customer email — populated for SUB_A only; NULL for other subsidiaries"

      - name: customer_region
        description: "Philippine region — populated for SUB_A only; NULL for other subsidiaries"

      - name: is_active
        description: "Whether the customer is currently active — populated for SUB_A only; TRUE for all others"

  # ── ent_account ───────────────────────────────────────────────────────────

  - name: ent_account
    description: >
      Enterprise account entity — bridges customer to transaction in the 3NF model.
      One row per commercial account per subsidiary.

      SUB_A — one retail account per customer (customer_id level)
      SUB_B — one freight account per client (client_id level)
      SUB_C — one account per loan (loan_id level; each loan is its own account)
      SUB_D — one manufacturing account per customer (customer_id level)
      SUB_E — one account per lease contract (contract_id level)

      account_key = MD5(subsidiary_code || account_id_nk)
      customer_key = FK → ent_customer (MD5(subsidiary_code || customer_id_nk))
      account_key is propagated to ent_transaction for use by
      mart_product_performance and mart_cost_center_spend.

    config:
      materialized: table

    columns:
      - name: account_key
        description: "Surrogate key — MD5(subsidiary_code || account_id_nk)"
        tests:
          - not_null
          - unique

      - name: account_id_nk
        description: "Natural account key from the source subsidiary system"
        tests:
          - not_null

      - name: customer_key
        description: "FK → ent_customer.customer_key"
        tests:
          - not_null
          - relationships:
              to: ref('ent_customer')
              field: customer_key

      - name: subsidiary_code
        description: "Source subsidiary"
        tests:
          - not_null
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: account_type
        description: >
          Type of account. SUB_A: RETAIL_ACCOUNT. SUB_B: FREIGHT_ACCOUNT.
          SUB_C: loan_type (Personal, Home, etc.). SUB_D: MANUFACTURING_ACCOUNT.
          SUB_E: LEASE_ACCOUNT.
        tests:
          - not_null

      - name: open_date
        description: "Date the account was opened (first transaction date for most subs; origination_date for SUB_C/E)"
        tests:
          - not_null

  # ── ent_product ───────────────────────────────────────────────────────────

  - name: ent_product
    description: >
      Enterprise product/material entity across all subsidiaries.
      One row per unique product per subsidiary.

      SUB_A — product_sku × category (retail SKUs grouped by category)
      SUB_B — service_type (freight service types: LCL, FCL, Express, etc.)
      SUB_C — loan_type (lending products: Personal, Home, Auto, etc.)
      SUB_D — material_id (SAP material numbers, cost_center = plant-based)
      SUB_E — lease_type × unit_type combinations

      product_key = MD5(subsidiary_code || product_id_nk)
      Propagated to ent_transaction and consumed by mart_product_performance
      and mart_cost_center_spend via the product_key join.

      Materialised as incremental with per-subsidiary watermarks.

    config:
      materialized: incremental
      unique_key: product_key
      on_schema_change: sync_all_columns

    columns:
      - name: product_key
        description: "Surrogate key — MD5(subsidiary_code || product_id_nk)"
        tests:
          - not_null
          - unique

      - name: product_id_nk
        description: "Natural product key from the source subsidiary system"
        tests:
          - not_null

      - name: subsidiary_code
        description: "Source subsidiary"
        tests:
          - not_null
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: product_category
        description: >
          Product category used in mart_product_performance.
          SUB_A: retail category (Electronics, Apparel, etc.).
          SUB_B: service_type. SUB_C: loan_type. SUB_D: MANUFACTURED_GOOD.
          SUB_E: lease_type.
        tests:
          - not_null

      - name: product_class
        description: >
          Product class for grouping across subsidiaries.
          SUB_A: RETAIL. SUB_B: FREIGHT_SERVICE. SUB_C: LOAN_PRODUCT.
          SUB_D: MATERIAL. SUB_E: unit_type.
        tests:
          - not_null

      - name: cost_center
        description: >
          Cost center for mart_cost_center_spend attribution.
          SUB_A: CC-RETAIL-{CATEGORY}. SUB_B: CC-LOGISTICS-OPS.
          SUB_C: CC-BANKING-{LOAN_TYPE}. SUB_D: CC-PLANT-{PLANT}.
          SUB_E: CC-PROPERTY-{LEASE_TYPE}.
        tests:
          - not_null

      - name: _loaded_at
        description: "MAX(_loaded_at) from staging at time of product record creation; incremental watermark"
        tests:
          - not_null

  # ── ent_transaction ───────────────────────────────────────────────────────

  - name: ent_transaction
    description: >
      Unified revenue transaction entity — one row per revenue event across
      all 5 subsidiaries. The core fact table of the 3NF integration layer.

      SUB_A  → retail POS order       gl: RETAIL_REVENUE
      SUB_B  → freight shipment        gl: FREIGHT_REVENUE
      SUB_C  → loan account            gl: INTEREST_INCOME
      SUB_D  → SAP sales order         gl: MANUFACTURING_REVENUE
      SUB_E  → lease contract          gl: RENTAL_INCOME

      All subsidiaries currently transact in PHP so amount_php = amount_local.
      FX logic is correct for future foreign-currency subsidiaries: non-PHP
      amounts are converted via fx_rates.rate (amount_local / rate → PHP).

      Carries three surrogate keys derived deterministically from staging:
        transaction_key = MD5(subsidiary_code || transaction_nk)
        account_key     = FK → ent_account
        product_key     = FK → ent_product

      Incremental with per-subsidiary watermarks:
        COALESCE(MAX(_loaded_at) WHERE subsidiary_code = X, '1900-01-01')

    config:
      materialized: incremental
      unique_key: transaction_key
      on_schema_change: sync_all_columns

    columns:
      - name: transaction_key
        description: "Surrogate PK — MD5(subsidiary_code || transaction_nk); globally unique"
        tests:
          - not_null
          - unique

      - name: account_key
        description: "FK → ent_account.account_key"
        tests:
          - not_null
          - relationships:
              to: ref('ent_account')
              field: account_key

      - name: product_key
        description: "FK → ent_product.product_key — enables mart_product_performance and mart_cost_center_spend joins"
        tests:
          - not_null
          - relationships:
              to: ref('ent_product')
              field: product_key

      - name: transaction_nk
        description: "Natural key from the source subsidiary system"
        tests:
          - not_null

      - name: subsidiary_code
        description: "Source subsidiary identifier"
        tests:
          - not_null
          - accepted_values:
              values: ["SUB_A", "SUB_B", "SUB_C", "SUB_D", "SUB_E"]

      - name: customer_id_nk
        description: "Natural customer key — join to ent_customer via (customer_id_nk, subsidiary_code)"
        tests:
          - not_null

      - name: transaction_date
        description: "Business date of the revenue event"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              column_type: date
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'2018-01-01'"
              max_value: "'2030-12-31'"

      - name: amount_local
        description: "Revenue amount in the subsidiary's local currency (PHP for all current subs)"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000000

      - name: currency_code
        description: "ISO 4217 currency code of amount_local"
        tests:
          - not_null
          - accepted_values:
              values: ["PHP", "USD", "SGD", "EUR", "JPY", "CNY"]

      - name: gl_account_code
        description: >
          Conformed GL account code from staging. All values are valid entries
          in the gl_account_mapping seed subsidiary_gl_code column.
        tests:
          - not_null
          - accepted_values:
              values:
                - "RETAIL_REVENUE"
                - "FREIGHT_REVENUE"
                - "INTEREST_INCOME"
                - "MANUFACTURING_REVENUE"
                - "RENTAL_INCOME"

      - name: amount_php
        description: >
          Revenue converted to PHP. For PHP transactions: amount_local directly.
          For foreign currency: ROUND(amount_local / fx_rates.rate, 2).
          NULL fx join defaults to amount_local via PHP short-circuit.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000000

      - name: _loaded_at
        description: "Audit timestamp inherited from staging; used as per-subsidiary incremental watermark"
        tests:
          - not_null
